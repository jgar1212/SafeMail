<!DOCTYPE html>
<html lang="en">
<head>
<title>SafeMail:Setup</title>
<meta charset="utf-8">
<link rel ="icon" type = "image/x-icon" href = "../../../img/SafeMail_logo.png">
</head>
<div id="wrapper">
<body>
<div>
<link rel="stylesheet" href="../CSS/SafeMail.css">
<header><h1><a href="Home.html" class = "header">SafeMail</a></h1></header> 
<div class="alignment">
<button id = "button" onclick="buttonClick()"></button>
<script>
const savedText = localStorage.getItem("buttonText");
const setupButton = document.getElementById("button");
let color ="";
if (savedText) {
		setupButton.innerHTML = savedText;
	}
else {
	setupButton.innerHTML = "Off";
	}
if (savedText==="Off") {
	color = "red";
}
else {
	color = "green";
}
function buttonClick() {
	if (setupButton.innerHTML === "Off") {
		setupButton.innerHTML = "On";
		color = "green";
		setupButton.style.backgroundColor = color;
		alert("SafeMail is enabled");
		localStorage.setItem("buttonText", "On");
	}
	else {
		setupButton.innerHTML = "Off";
		color = "red";
		setupButton.style.backgroundColor = color;
		alert("SafeMail is disabled");
		localStorage.setItem("buttonText", "Off");
	}
}
</script>
</div>
</div>
</body>
</div>
