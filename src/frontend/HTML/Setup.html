<!DOCTYPE html>

<div>
<link rel="stylesheet" href="../CSS/SafeMail.css">
<header><h1><a href="Home.html" class = "header">SafeMail</a></h1></header> 
<div class="alignment">
<button id = "button" onclick="textChange()">Off</button>
<script>
function textChange() {
	var x = document.getElementById("button");
	if (x.innerHTML === "Off") {
		x.innerHTML = "On";
		alert("SafeMail is enabled");
	} else {
		x.innerHTML = "Off";
		alert("SafeMail is now disbaled");
	}
}
</script>

</div>
